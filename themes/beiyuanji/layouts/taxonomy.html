{{ define "main" }}
  <div class="page-header">
    <h1>{{ .Title }}</h1>
    {{ with .Content }}<div class="taxonomy-description">{{ . }}</div>{{ end }}
  </div>
  <div class="taxonomy-accordion">
    {{ range $index, $term := .Pages.ByTitle }}
      <details class="taxonomy-panel"{{ if eq $index 0 }} open{{ end }}>
        <summary class="taxonomy-panel__summary">
          <span class="taxonomy-panel__title">{{ .LinkTitle }}</span>
          <span class="taxonomy-panel__count">{{ len .Pages }} 篇</span>
        </summary>
        <div class="taxonomy-panel__body">
          <ol class="taxonomy-panel__list">
            {{ range .Pages.ByDate.Reverse }}
              <li>
                <a href="{{ .RelPermalink }}">{{ .Title }}</a>
                <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
              </li>
            {{ end }}
          </ol>
          <a class="taxonomy-panel__more" href="{{ .RelPermalink }}">进入专题页 →</a>
        </div>
      </details>
    {{ end }}
  </div>
{{ end }}
